name = "da-sc"
main = "src/index.ts"
compatibility_date = "2025-07-10"
compatibility_flags = ["global_fetch_strictly_public"]
workers_dev = true

[vars]
VERSION = "@@VERSION@@-dev"
ENVIRONMENT = "dev"

# CI environment
[env.ci]
name = "da-sc-ci"
[env.ci.vars]
VERSION = "@@VERSION@@-ci"
ENVIRONMENT = "ci"

# Production environment
[env.production]
name = "da-sc"
[env.production.vars]
VERSION = "@@VERSION@@"
ENVIRONMENT = "production"

# Fragment API (cf) test environment — standalone deploy target for trying the
# /cf and /cfm routes without touching dev or production.
[env.cf]
name = "da-sc-cf"
workers_dev = true
[env.cf.vars]
VERSION = "@@VERSION@@-cf"
ENVIRONMENT = "cf"